services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance-postgres
    environment:
      POSTGRES_USER: compliance_user
      POSTGRES_PASSWORD: compliance_pass
      POSTGRES_DB: compliance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance_user -d compliance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: compliance-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://compliance_user:compliance_pass@postgres:5432/compliance_db?schema=public"
      NEXTAUTH_SECRET: "change-me-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
